<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — Boys of Winter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body style="background:#0b1220;color:#e2e8f0;font-family:system-ui,sans-serif;padding:2rem;">
  <div style="max-width:30rem;margin:0 auto;">
    <p><a href="{{ url_for('hub_auth.login') }}" style="color:#38bdf8;">← Back to log in</a></p>
    <h1 style="margin-top:0;">Set a new password</h1>
    {% if invalid %}
      <p style="color:#f87171;">{{ error or "This reset link is invalid or has expired." }}</p>
      <p class="muted"><a href="{{ url_for('hub_auth.forgot_password') }}">Request a new reset link</a></p>
    {% else %}
      <p class="muted" style="font-size:0.9rem;">Choose a new password for your GM account.</p>
      {% if error %}<p style="color:#f87171;">{{ error }}</p>{% endif %}
      <form method="post" class="card" style="padding:1.25rem;display:grid;gap:0.85rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>New password (8+ characters)<br><input type="password" name="password" required autocomplete="new-password" style="width:100%;padding:0.5rem;"></label>
        <label>Confirm new password<br><input type="password" name="password_confirm" required autocomplete="new-password" style="width:100%;padding:0.5rem;"></label>
        <button type="submit" class="join-league-btn" style="border:none;cursor:pointer;">Reset password</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
