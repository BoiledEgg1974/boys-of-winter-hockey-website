<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 560" aria-hidden="true">
  <defs>
    <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3358"/>
      <stop offset="45%" stop-color="#1e4a7a"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <linearGradient id="boards" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="8%" stop-color="#1e293b"/>
      <stop offset="92%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <radialGradient id="creaseIce" cx="50%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1e4a7a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Flipped: goal at top, center line at bottom (GK → DEF → FWD top-to-bottom on screen) -->
  <g transform="translate(0,560) scale(1,-1)">
  <!-- Ice surface (defensive zone through center line) -->
  <rect width="360" height="560" fill="url(#ice)"/>
  <rect x="18" y="0" width="324" height="560" fill="url(#boards)" opacity="0.35"/>
  <rect x="28" y="0" width="304" height="560" fill="url(#ice)"/>

  <!-- Boards side trim -->
  <rect x="0" y="0" width="28" height="560" fill="#0f172a" opacity="0.85"/>
  <rect x="332" y="0" width="28" height="560" fill="#0f172a" opacity="0.85"/>

  <!-- Center red line (top of half-rink) -->
  <line x1="28" y1="52" x2="332" y2="52" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  <!-- Center circle (half, below red line) -->
  <circle cx="180" cy="52" r="62" fill="none" stroke="#dc2626" stroke-width="3.5" opacity="0.9"/>
  <rect x="28" y="0" width="304" height="52" fill="url(#ice)"/>

  <!-- Blue line -->
  <line x1="28" y1="248" x2="332" y2="248" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="28" y1="252" x2="332" y2="252" stroke="#93c5fd" stroke-width="1.5" opacity="0.45"/>

  <!-- Neutral zone tint above blue line -->
  <rect x="28" y="52" width="304" height="196" fill="#3b82f6" opacity="0.06"/>

  <!-- Goal line -->
  <line x1="28" y1="498" x2="332" y2="498" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>

  <!-- Crease -->
  <path
    d="M 180 498
       A 52 38 0 0 1 128 498
       L 128 518
       L 232 518
       L 232 498
       A 52 38 0 0 1 180 498 Z"
    fill="url(#creaseIce)"
    stroke="#93c5fd"
    stroke-width="2"
    opacity="0.95"/>
  <!-- Goal frame -->
  <path
    d="M 118 518 L 118 532 L 242 532 L 242 518"
    fill="none"
    stroke="#e2e8f0"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.75"/>
  <line x1="118" y1="518" x2="242" y2="518" stroke="#e2e8f0" stroke-width="2.5" opacity="0.55"/>

  <!-- Faceoff dots (defensive zone) -->
  <circle cx="95" cy="430" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="265" cy="430" r="5" fill="#dc2626" opacity="0.85"/>
  <circle cx="180" cy="395" r="5" fill="#dc2626" opacity="0.55"/>

  <!-- Subtle ice scrape marks -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.04">
    <path d="M 60 300 Q 120 280 180 300 T 300 300"/>
    <path d="M 80 380 Q 140 360 200 380 T 280 380"/>
  </g>
  </g>
</svg>
