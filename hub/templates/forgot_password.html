<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password — Boys of Winter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body style="background:#0b1220;color:#e2e8f0;font-family:system-ui,sans-serif;padding:2rem;">
  <div style="max-width:30rem;margin:0 auto;">
    <p><a href="{{ url_for('hub_auth.login') }}" style="color:#38bdf8;">← Back to log in</a></p>
    <h1 style="margin-top:0;">Reset GM password</h1>
    <p class="muted" style="font-size:0.9rem;">Enter your GM account email and we will send a reset link.</p>
    {% if error %}<p style="color:#f87171;">{{ error }}</p>{% endif %}
    <form method="post" class="card" style="padding:1.25rem;display:grid;gap:0.85rem;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Email<br><input type="email" name="email" required autocomplete="email" style="width:100%;padding:0.5rem;"></label>
      <button type="submit" class="join-league-btn" style="border:none;cursor:pointer;">Send reset link</button>
    </form>
  </div>
</body>
</html>
